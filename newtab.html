<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="color-scheme" content="dark">
    <title>New Tab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="newtab.css">
</head>
<body>
    <div class="container">
        <div class="search-wrapper">
            <h1 id="greetingText" class="greeting-text"></h1>
            <div id="namePrompt" class="name-prompt" style="display: none;">
                <div class="name-prompt-text">What's your name?</div>
                <input type="text" id="nameInput" class="name-input" placeholder="Enter your name" maxlength="50">
                <div class="name-prompt-hint">Press Enter to save</div>
            </div>
            <div class="search-box">
                <span id="enginePrefix" class="engine-prefix" aria-hidden="true"></span>
                <span class="engine-prefix-divider" aria-hidden="true"></span>
                <textarea
                    id="searchInput"
                    class="search-input"
                    placeholder="Search anything..."
                    rows="1"
                    autocomplete="off"
                    spellcheck="false"
                    autofocus
                ></textarea>
                <button type="button" id="shortcutsButton" class="shortcuts-button" title="View shortcuts">⌘</button>
            </div>
            
            <div id="shortcutsMenu" class="shortcuts-menu" style="display: none;">
                <div class="shortcuts-header">Shortcuts</div>
                <div class="shortcuts-help">Type alias at start or end: <code>ggl cats</code> or <code>cats ggl</code></div>
                <div id="shortcutsList" class="shortcuts-list"></div>
            </div>

            <div id="bookmarksResults" class="bookmarks-results"></div>

            <div class="engines" id="engineButtons"></div>
            <div class="bottom-actions">
                <button type="button" id="closeOtherTabsButton" class="utility-pill">Close Other Tabs</button>
                <button type="button" id="manageExtensionsButton" class="utility-pill">Manage Extensions</button>
            </div>
        </div>
    </div>

    <script src="newtab.js"></script>
</body>
</html>
