<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="color-scheme" content="dark">
    <title>New Tab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="newtab.css">
</head>
<body>
    <div class="container">
        <div class="search-wrapper">
            <div class="search-box">
                <span id="enginePrefix" class="engine-prefix" aria-hidden="true">G</span>
                <span class="engine-prefix-divider" aria-hidden="true"></span>
                <textarea
                    id="searchInput"
                    class="search-input"
                    placeholder="Search anything..."
                    rows="1"
                    autocomplete="off"
                    spellcheck="false"
                ></textarea>
            </div>

            <div class="engines" id="engineButtons"></div>
        </div>
    </div>

    <script src="newtab.js"></script>
</body>
</html>
